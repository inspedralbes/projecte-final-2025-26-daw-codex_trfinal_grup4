; =============================================================
;  PHP – Configuración de DESARROLLO
; =============================================================

[PHP]
; Errores visibles en desarrollo
display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On

; Permite leer URLs remotas (necesario para descargar avatares de Google)
allow_url_fopen = On

; Límites generosos para desarrollo
memory_limit = 512M
upload_max_filesize = 100M
post_max_size = 100M
max_execution_time = 300
max_input_time = 300

; OPcache activado para eliminar latencia de lectura de disco en Windows Docker
opcache.enable = 1
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0
opcache.max_accelerated_files = 10000
opcache.memory_consumption = 128

[Date]
date.timezone = Europe/Madrid

[Xdebug]
xdebug.mode = debug,develop
xdebug.start_with_request = trigger
xdebug.client_host = host.docker.internal
xdebug.client_port = 9003
xdebug.idekey = VSCODE
