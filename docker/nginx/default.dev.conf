# =============================================================
#  Nginx – DESARROLLO
#  Punto de entrada: http://localhost:8080
#  Usa resolver dinámico para evitar fallos si un upstream
#  no está listo al arrancar Nginx.
# =============================================================

server {
    listen 80;
    server_name localhost;

    # Permitir uploads de hasta 100 MB (por defecto Nginx limita a 1MB)
    client_max_body_size 100M;

    # Resolver DNS interno de Docker (para resolución dinámica)
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ---------------------------------------------------------
    #  Logs
    # ---------------------------------------------------------
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # ---------------------------------------------------------
    #  1. API – Laravel (PHP-FPM)
    #     Peticiones: /api/*
    # ---------------------------------------------------------
    location ~ ^/api(.*)$ {
        set $backend api:9000;

        fastcgi_pass $backend;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param REQUEST_URI $request_uri;
        include fastcgi_params;

        # Timeouts generosos para depuración
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
    }

    # ---------------------------------------------------------
    #  2. Socket.io – Node.js
    #     Peticiones: /socket.io/*
    # ---------------------------------------------------------
    location /socket.io/ {
        set $socketio http://socket:3000;

        proxy_pass $socketio;
        proxy_http_version 1.1;

        # WebSocket upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Deshabilitar buffering para real-time
        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;
    }

    # ---------------------------------------------------------
    #  3. Storage – User-uploaded files (avatars, etc.)
    #     Served directly from the API's public/storage directory
    # ---------------------------------------------------------
    location /storage/ {
        root /var/www/html/public;
        access_log off;

        expires 30d;
        add_header Cache-Control "public, immutable";

        # Return 404 if the file doesn't exist (don't fall through to Vite)
        try_files $uri =404;
    }

    # ---------------------------------------------------------
    #  4. Frontend – Vite Dev Server
    #     Peticiones: / (todo lo demás)
    # ---------------------------------------------------------

    # Vite HMR WebSocket
    location /@vite/ {
        set $vite http://client:5173;

        proxy_pass $vite;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Vite internal paths
    location /__vite_ping {
        set $vite http://client:5173;

        proxy_pass $vite;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /node_modules/ {
        set $vite http://client:5173;
        proxy_pass $vite;
    }

    location /src/ {
        set $vite http://client:5173;
        proxy_pass $vite;
    }

    # Todo lo demás → Vite
    location / {
        set $vite http://client:5173;

        proxy_pass $vite;
        proxy_http_version 1.1;

        # Soporte WebSocket para Hot Reload
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
