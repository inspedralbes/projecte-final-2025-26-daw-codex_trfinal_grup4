# =============================================================
#  Nginx – PRODUCCIÓN
#  Punto de entrada: https://dominio.com (SSL + HTTP→HTTPS)
# =============================================================

upstream php-fpm {
    server api:9000;
}

upstream socketio {
    server socket:3000;
}

# ---------------------------------------------------------
#  Servidor HTTP (80) – Redirección a HTTPS + ACME challenge
# ---------------------------------------------------------
server {
    listen 80;
    server_name _;

    # Let's Encrypt – desafío ACME (necesario para obtener/renovar certificados)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirigir todo lo demás a HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------
#  Servidor HTTPS (443) – Servidor principal
# ---------------------------------------------------------
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    client_max_body_size 50M;

    # ---------------------------------------------------------
    #  Certificados SSL (Let's Encrypt / Certbot)
    # ---------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;

    # Parámetros SSL recomendados
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # HSTS (15768000 segundos = 6 meses)
    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;

    # Raíz: archivos estáticos compilados de React
    root /var/www/html/client/dist;
    index index.html;

    # ---------------------------------------------------------
    #  Logs
    # ---------------------------------------------------------
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # ---------------------------------------------------------
    #  Cabeceras de seguridad
    # ---------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ---------------------------------------------------------
    #  Compresión Gzip
    # ---------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ---------------------------------------------------------
    #  1. API – Laravel (PHP-FPM)
    # ---------------------------------------------------------
    location ~ ^/api(.*)$ {
        fastcgi_pass php-fpm;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param REQUEST_URI $1$is_args$args;
        include fastcgi_params;

        fastcgi_read_timeout 60;
        fastcgi_send_timeout 60;

        # Sin buffering para respuestas streaming
        fastcgi_buffering on;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 16 16k;
    }

    # ---------------------------------------------------------
    #  1b. Storage – User-uploaded files (avatars, banners, etc.)
    #      Served directly from the API storage volume
    # ---------------------------------------------------------
    location /storage/ {
        alias /var/www/html/api_storage/app/public/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ---------------------------------------------------------
    #  2. Socket.io – Node.js (WSS – WebSocket Secure)
    # ---------------------------------------------------------
    location /socket.io/ {
        proxy_pass http://socketio;
        proxy_http_version 1.1;

        # HTTP Upgrade para WebSockets (WSS a través de HTTPS)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;

        # Timeouts para conexiones WebSocket de larga duración
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ---------------------------------------------------------
    #  3. Caché de activos estáticos
    # ---------------------------------------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ---------------------------------------------------------
    #  4. React SPA – fallback a index.html
    # ---------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---------------------------------------------------------
    #  Denegación de archivos ocultos
    # ---------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
