# =============================================================
#  Nginx – PRODUCCIÓN
#  Punto de entrada: http://dominio.com (puerto 80)
# =============================================================

upstream php-fpm {
    server api:9000;
}

upstream socketio {
    server socket:3000;
}

server {
    listen 80;
    server_name _;

    # Raíz: archivos estáticos compilados de React
    root /var/www/html/client/dist;
    index index.html;

    # ---------------------------------------------------------
    #  Logs
    # ---------------------------------------------------------
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # ---------------------------------------------------------
    #  Cabeceras de seguridad
    # ---------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ---------------------------------------------------------
    #  Compresión Gzip
    # ---------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ---------------------------------------------------------
    #  1. API – Laravel (PHP-FPM)
    # ---------------------------------------------------------
    location ~ ^/api(.*)$ {
        fastcgi_pass php-fpm;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param REQUEST_URI $1$is_args$args;
        include fastcgi_params;

        fastcgi_read_timeout 60;
        fastcgi_send_timeout 60;

        # Sin buffering para respuestas streaming
        fastcgi_buffering on;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 16 16k;
    }

    # ---------------------------------------------------------
    #  2. Socket.io – Node.js
    # ---------------------------------------------------------
    location /socket.io/ {
        proxy_pass http://socketio;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;
    }

    # ---------------------------------------------------------
    #  3. Caché de activos estáticos
    # ---------------------------------------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ---------------------------------------------------------
    #  4. React SPA – fallback a index.html
    # ---------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---------------------------------------------------------
    #  Denegación de archivos ocultos
    # ---------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
