# =============================================================
#  Docker Compose – PRODUCCIÓN
#  Un único .env en la raíz como fuente de verdad
#  Levantar: docker compose -f docker-compose.prod.yml up --build -d
# =============================================================

services:
  # -----------------------------------------------------------
  #  Nginx – Reverse Proxy
  # -----------------------------------------------------------
  webserver:
    image: nginx:1.25-alpine
    container_name: tfg_webserver_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.prod.conf:/etc/nginx/templates/default.conf.template:ro
      - client_build:/var/www/html/client/dist:ro
      - api_storage:/var/www/html/api_storage:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    environment:
      - DOMAIN=${DOMAIN}
    depends_on:
      api:
        condition: service_started
      client:
        condition: service_completed_successfully
      socket:
        condition: service_started
    networks:
      - tfg_network

  # -----------------------------------------------------------
  #  Backend – Laravel 11 (PHP 8.3-FPM)
  # -----------------------------------------------------------
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: production
    container_name: tfg_api_prod
    restart: always
    env_file: .env
    volumes:
      - ./.env:/var/www/html/.env:ro
      - ./docker/php/php.prod.ini:/usr/local/etc/php/conf.d/custom.ini:ro
      - api_storage:/var/www/html/storage
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - AI_MODERATION_ENABLED=${AI_MODERATION_ENABLED:-true}
      - AI_MODERATION_URL=http://ai-moderation:8088
      - AI_MODERATION_TIMEOUT_SECONDS=${AI_MODERATION_TIMEOUT_SECONDS:-4}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-moderation:
        condition: service_started
    networks:
      - tfg_network

  # -----------------------------------------------------------
  #  Queue Worker – Background tasks (Emails, AI logs, etc.)
  # -----------------------------------------------------------
  queue:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: production
    container_name: tfg_queue_prod
    restart: always
    env_file: .env
    command: ["php", "artisan", "queue:work", "--tries=3", "--timeout=90"]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tfg_network

  # -----------------------------------------------------------
  #  AI Moderation – Node.js + Transformers
  # -----------------------------------------------------------
  ai-moderation:
    build:
      context: ./ai-moderation
      dockerfile: Dockerfile
    container_name: tfg_ai_moderation_prod
    restart: always
    env_file: .env
    environment:
      - PORT=8088
      - AI_MODEL_ENABLED=${AI_MODEL_ENABLED:-true}
      - AI_MODEL_ID=${AI_MODEL_ID:-Xenova/toxic-bert}
      - AI_ZERO_SHOT_ENABLED=${AI_ZERO_SHOT_ENABLED:-true}
      - AI_ZERO_SHOT_MODEL_ID=${AI_ZERO_SHOT_MODEL_ID:-MoritzLaurer/mDeBERTa-v3-base-mnli-xnli}
      - AI_ZERO_SHOT_BLOCK_THRESHOLD=${AI_ZERO_SHOT_BLOCK_THRESHOLD:-0.52}
      - AI_LLM_ENABLED=${AI_LLM_ENABLED:-false}
      - AI_LLM_BASE_URL=${AI_LLM_BASE_URL:-https://api.openai.com/v1}
      - AI_LLM_API_KEY=${AI_LLM_API_KEY:-}
      - AI_LLM_MODEL=${AI_LLM_MODEL:-gpt-4o-mini}
      - AI_BLOCK_THRESHOLD=${AI_BLOCK_THRESHOLD:-0.72}
      - AI_MEDIUM_THRESHOLD=${AI_MEDIUM_THRESHOLD:-0.45}
      - AI_HIGH_THRESHOLD=${AI_HIGH_THRESHOLD:-0.65}
      - AI_CRITICAL_THRESHOLD=${AI_CRITICAL_THRESHOLD:-0.85}
      - AI_MAX_TEXT_LENGTH=${AI_MAX_TEXT_LENGTH:-6000}
      - AI_MODERATION_API_KEY=${AI_MODERATION_API_KEY:-}
    networks:
      - tfg_network

  # -----------------------------------------------------------
  #  Frontend – React Build (copia estáticos y sale)
  # -----------------------------------------------------------
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: production
      args:
        - VITE_API_URL=${VITE_API_URL}
        - VITE_SOCKET_URL=${VITE_SOCKET_URL}
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
    container_name: tfg_client_prod
    restart: "no"
    volumes:
      - client_build:/output
    command: ["sh", "-c", "cp -r /app/dist/* /output/ && echo 'Build copied'"]
    networks:
      - tfg_network

  # -----------------------------------------------------------
  #  Socket – Node.js + Socket.io
  # -----------------------------------------------------------
  socket:
    build:
      context: ./socket
      dockerfile: Dockerfile
      target: production
    container_name: tfg_socket_prod
    restart: always
    env_file: .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - tfg_network

  # -----------------------------------------------------------
  #  MySQL 8.0
  # -----------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: tfg_mysql_prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${DB_ROOT_PASSWORD}",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - tfg_network

  # -----------------------------------------------------------
  #  Redis
  # -----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: tfg_redis_prod
    restart: always
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - tfg_network

  # -----------------------------------------------------------
  #  Certbot – Let's Encrypt SSL
  # -----------------------------------------------------------
  certbot:
    image: certbot/certbot:latest
    container_name: tfg_certbot_prod
    restart: "no"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    networks:
      - tfg_network

volumes:
  mysql_data:
  redis_data:
  api_storage:
  client_build:
  certbot_www:

networks:
  tfg_network:
    driver: bridge
