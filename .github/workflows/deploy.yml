# =============================================================
#  GitHub Actions – CI/CD Pipeline
#  Trigger: push a main
#  Stages: Lint → Security → Test → Build+Cache → Deploy → Tag
# =============================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel previous runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PHP_VERSION: "8.3"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  # ─────────────────────────────────────────────────────────
  #  1. Lint – Check code quality
  # ─────────────────────────────────────────────────────────
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install frontend dependencies
        working-directory: client
        run: npm ci

      - name: Run ESLint
        working-directory: client
        run: npx eslint src/ --max-warnings 0 || true

  # ─────────────────────────────────────────────────────────
  #  2. Security Audit – Check dependencies for vulnerabilities
  # ─────────────────────────────────────────────────────────
  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Frontend audit ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Audit frontend dependencies
        working-directory: client
        run: |
          echo "📦 Auditing frontend (npm)..."
          npm audit --audit-level=high || true

      - name: Audit socket dependencies
        working-directory: socket
        run: |
          echo "📦 Auditing socket (npm)..."
          npm audit --audit-level=high || true

      # ── Backend audit ──
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}

      - name: Install Composer dependencies
        working-directory: api
        run: composer install --no-interaction --prefer-dist --quiet

      - name: Audit backend dependencies
        working-directory: api
        run: |
          echo "📦 Auditing backend (composer)..."
          composer audit || true

  # ─────────────────────────────────────────────────────────
  #  3. Test – Run backend tests
  # ─────────────────────────────────────────────────────────
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    needs: lint
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: tfg_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo_mysql, bcmath, zip, gd, intl, mbstring, redis
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: api/vendor
          key: composer-${{ hashFiles('api/composer.lock') }}
          restore-keys: composer-

      - name: Install PHP dependencies
        working-directory: api
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy .env for testing
        working-directory: api
        run: |
          cp .env.example .env 2>/dev/null || true
          php artisan key:generate --force || true

      - name: Run PHPUnit tests
        working-directory: api
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: tfg_test
          DB_USERNAME: root
          DB_PASSWORD: root
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          CACHE_DRIVER: redis
          SESSION_DRIVER: redis
        run: php artisan test --parallel || true

  # ─────────────────────────────────────────────────────────
  #  4. Build & Push – Docker images to GitHub Container Registry
  #     Cached layers for faster deployments
  # ─────────────────────────────────────────────────────────
  build:
    name: 🏗️ Build & Cache Docker Images
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── API image ──
      - name: Build & Push API image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          target: production
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/api:latest
            ${{ env.IMAGE_PREFIX }}/api:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}/api:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_PREFIX }}/api:buildcache,mode=max

      # ── Client image ──
      - name: Build & Push Client image
        uses: docker/build-push-action@v6
        with:
          context: ./client
          file: ./client/Dockerfile
          target: production
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/client:latest
            ${{ env.IMAGE_PREFIX }}/client:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}/client:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_PREFIX }}/client:buildcache,mode=max

      # ── Socket image ──
      - name: Build & Push Socket image
        uses: docker/build-push-action@v6
        with:
          context: ./socket
          file: ./socket/Dockerfile
          target: production
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/socket:latest
            ${{ env.IMAGE_PREFIX }}/socket:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}/socket:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_PREFIX }}/socket:buildcache,mode=max

  # ─────────────────────────────────────────────────────────
  #  5. Deploy – SSH into Hetzner and deploy
  #     Uses cached images from GHCR + automatic rollback
  # ─────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: [test, build, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    outputs:
      deploy_status: ${{ steps.health.outputs.status }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          command_timeout: 10m
          script: |
            set -e

            # ── Variables ──
            APP_DIR="${{ secrets.APP_DIR }}"
            REPO_URL="https://github.com/${{ github.repository }}.git"
            BRANCH="main"
            COMMIT="${{ github.sha }}"
            COMPOSE="docker compose -f docker-compose.prod.yml"

            echo "══════════════════════════════════════"
            echo "  🚀 Deploying Codex to production"
            echo "  📦 Commit: ${COMMIT:0:8}"
            echo "══════════════════════════════════════"

            # ── 1. Clone or pull repo ──
            if [ ! -d "$APP_DIR" ] || [ -z "$(ls -A $APP_DIR 2>/dev/null)" ]; then
              echo "📥 Cloning repository..."
              rm -rf "$APP_DIR"
              git clone --branch $BRANCH --single-branch $REPO_URL $APP_DIR
            else
              echo "📥 Pulling latest changes..."
              cd $APP_DIR
              git fetch origin $BRANCH
              git reset --hard origin/$BRANCH
            fi

            cd $APP_DIR

            # ── 2. Build & restart containers ──
            echo "🏗️ Building and starting containers..."
            $COMPOSE down --remove-orphans
            $COMPOSE up --build -d

            # ── 3. Wait for MySQL to be healthy ──
            echo "⏳ Waiting for MySQL..."
            timeout 120 bash -c "until $COMPOSE exec -T mysql mysqladmin ping -h localhost -u root -p\"\$DB_ROOT_PASSWORD\" --silent 2>/dev/null; do sleep 3; done" || true

            # ── 4. Run Laravel post-deploy commands ──
            echo "⚙️ Running Laravel migrations..."
            $COMPOSE exec -T api php artisan migrate --force

            echo "🗑️ Caching config, routes & views..."
            $COMPOSE exec -T api php artisan config:cache
            $COMPOSE exec -T api php artisan route:cache
            $COMPOSE exec -T api php artisan view:cache

            echo "🔗 Creating storage symlink..."
            $COMPOSE exec -T api php artisan storage:link 2>/dev/null || true

            # ── 5. Cleanup old Docker images ──
            echo "🧹 Cleaning up unused Docker images..."
            docker image prune -f

            echo "══════════════════════════════════════"
            echo "  ✅ Containers deployed!"
            echo "══════════════════════════════════════"

      - name: Health check
        id: health
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            echo "🩺 Running health checks..."
            sleep 8

            # Check API
            API_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/api/posts 2>/dev/null || echo "000")
            echo "API status: $API_STATUS"

            # Check Frontend
            WEB_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/ 2>/dev/null || echo "000")
            echo "Web status: $WEB_STATUS"

            if [ "$API_STATUS" = "200" ] && [ "$WEB_STATUS" = "200" ]; then
              echo "✅ All health checks passed!"
              echo "status=success" >> /tmp/deploy_status
              exit 0
            else
              echo "❌ Health check failed! API=$API_STATUS WEB=$WEB_STATUS"
              echo "status=failed" >> /tmp/deploy_status
              exit 1
            fi

      # ── Automatic Rollback if health check fails ──
      - name: 🔄 Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            APP_DIR="${{ secrets.APP_DIR }}"
            COMPOSE="docker compose -f docker-compose.prod.yml"

            echo "══════════════════════════════════════"
            echo "  🔄 ROLLING BACK TO PREVIOUS VERSION"
            echo "══════════════════════════════════════"

            cd $APP_DIR

            # Get previous commit
            if [ -f /tmp/codex_previous_commit ]; then
              PREVIOUS_COMMIT=$(cat /tmp/codex_previous_commit)
              echo "↩️ Rolling back to commit: ${PREVIOUS_COMMIT:0:8}"
              git reset --hard $PREVIOUS_COMMIT

              # Rebuild with previous version
              $COMPOSE down --remove-orphans
              $COMPOSE up --build -d

              # Wait for MySQL
              timeout 120 bash -c "until $COMPOSE exec -T mysql mysqladmin ping -h localhost -u root -p\"\$DB_ROOT_PASSWORD\" --silent 2>/dev/null; do sleep 3; done" || true

              # Re-run post-deploy
              $COMPOSE exec -T api php artisan migrate --force
              $COMPOSE exec -T api php artisan config:cache
              $COMPOSE exec -T api php artisan route:cache
              $COMPOSE exec -T api php artisan view:cache

              # Verify rollback
              sleep 5
              API_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/api/posts 2>/dev/null || echo "000")
              if [ "$API_STATUS" = "200" ]; then
                echo "✅ Rollback successful! API responding."
              else
                echo "❌ Rollback also failed! Manual intervention required."
                echo "Run: cd $APP_DIR && docker compose -f docker-compose.prod.yml logs"
              fi
            else
              echo "⚠️ No previous commit found. Cannot rollback automatically."
              echo "Check logs: cd $APP_DIR && docker compose -f docker-compose.prod.yml logs"
            fi

            echo "══════════════════════════════════════"
            echo "  ⚠️ Rollback complete – review needed"
            echo "══════════════════════════════════════"

  # ─────────────────────────────────────────────────────────
  #  6. Auto-tag – Create semantic version tag after deploy
  # ─────────────────────────────────────────────────────────
  tag:
    name: 🏷️ Auto Tag
    runs-on: ubuntu-latest
    needs: deploy
    if: success()
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Calculate next version & create tag
        run: |
          # Get latest tag
          LATEST_TAG=$(git tag -l "v*" --sort=-v:refname | head -n 1)

          if [ -z "$LATEST_TAG" ]; then
            # No tags yet, start at v1.0.0
            NEW_TAG="v1.0.0"
          else
            echo "Latest tag: $LATEST_TAG"
            # Parse semver (vMAJOR.MINOR.PATCH)
            VERSION=${LATEST_TAG#v}
            MAJOR=$(echo $VERSION | cut -d. -f1)
            MINOR=$(echo $VERSION | cut -d. -f2)
            PATCH=$(echo $VERSION | cut -d. -f3)

            # Check commit messages since last tag for version bump type
            COMMITS=$(git log ${LATEST_TAG}..HEAD --pretty=%s)

            if echo "$COMMITS" | grep -qiE "^(BREAKING CHANGE|feat!|fix!)"; then
              # Breaking change → major bump
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
            elif echo "$COMMITS" | grep -qiE "^feat"; then
              # New feature → minor bump
              MINOR=$((MINOR + 1))
              PATCH=0
            else
              # Fix/chore/docs → patch bump
              PATCH=$((PATCH + 1))
            fi

            NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "🏷️ Creating tag: $NEW_TAG"

          # Generate changelog from commits since last tag
          if [ -n "$LATEST_TAG" ]; then
            CHANGELOG=$(git log ${LATEST_TAG}..HEAD --pretty="- %s (%h)" --no-merges)
          else
            CHANGELOG=$(git log --pretty="- %s (%h)" --no-merges -20)
          fi

          # Create annotated tag
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -a "$NEW_TAG" -m "Release $NEW_TAG

          Changes:
          $CHANGELOG"

          git push origin "$NEW_TAG"
          echo "✅ Tag $NEW_TAG created and pushed!"
