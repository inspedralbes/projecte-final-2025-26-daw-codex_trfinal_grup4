# =============================================================
#  GitHub Actions – CI/CD Pipeline (Simplified)
#  Trigger: push a main
#  Stages: Lint → Test → Deploy → Tag
# =============================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PHP_VERSION: "8.3"

jobs:
  # ─────────────────────────────────────────────────────────
  #  1. Lint
  # ─────────────────────────────────────────────────────────
  lint:
    name: "🔍 Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Lint frontend
        working-directory: client
        run: npm ci && npx eslint src/ --max-warnings 0 || true

  # ─────────────────────────────────────────────────────────
  #  2. Test
  # ─────────────────────────────────────────────────────────
  test:
    name: "🧪 Test"
    runs-on: ubuntu-latest
    needs: lint
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: tfg_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo_mysql, bcmath, zip, gd, intl, mbstring, redis

      - uses: actions/cache@v4
        with:
          path: api/vendor
          key: composer-${{ hashFiles('api/composer.lock') }}
          restore-keys: composer-

      - name: Install & test
        working-directory: api
        env:
          APP_ENV: testing
          APP_KEY: base64:dGVzdGtleXRlc3RrZXl0ZXN0a2V5dGVzdGtleXQ=
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: tfg_test
          DB_USERNAME: root
          DB_PASSWORD: root
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
          MAIL_MAILER: log
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
        run: |
          composer install --no-interaction --prefer-dist --no-scripts
          cat > .env << 'EOF'
          APP_NAME=Laravel
          APP_ENV=testing
          APP_KEY=
          APP_DEBUG=true
          DB_CONNECTION=mysql
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_DATABASE=tfg_test
          DB_USERNAME=root
          DB_PASSWORD=root
          CACHE_STORE=array
          SESSION_DRIVER=array
          QUEUE_CONNECTION=sync
          MAIL_MAILER=log
          REDIS_HOST=127.0.0.1
          REDIS_PORT=6379
          EOF
          php artisan key:generate --force
          php artisan test --parallel || true

  # ─────────────────────────────────────────────────────────
  #  3. Deploy – SSH into server, pull & restart
  # ─────────────────────────────────────────────────────────
  deploy:
    name: "🚀 Deploy"
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          timeout: 30m
          command_timeout: 30m
          script: |
            set -e
            APP_DIR="/opt/codex"
            COMPOSE="docker compose -f docker-compose.prod.yml"

            echo "🚀 Deploying commit ${{ github.sha }}"

            # ── 1. Pull latest code ──
            cd $APP_DIR
            git fetch origin main
            git reset --hard origin/main

            # ── 2. Build & restart (preserve SSL certificates) ──
            $COMPOSE stop
            $COMPOSE build
            $COMPOSE up -d

            # ── 3. Wait for MySQL ──
            echo "⏳ Waiting for MySQL..."
            for i in $(seq 1 60); do
              $COMPOSE exec -T mysql mysqladmin ping -h localhost --silent 2>/dev/null && break
              sleep 2
            done

            # ── 4. Laravel post-deploy ──
            echo "⚙️ Running migrations..."
            for i in $(seq 1 5); do
              $COMPOSE exec -T api php artisan migrate --force && break
              echo "  Retry $i/5..."
              sleep 5
            done

            $COMPOSE exec -T api php artisan config:cache
            $COMPOSE exec -T api php artisan route:cache

            # ── 5. Ensure storage link ──
            $COMPOSE exec -T api sh -c "rm -f public/storage && ln -s ../storage/app/public public/storage 2>/dev/null || true"

            # ── 6. Cleanup ──
            docker image prune -f
            echo "✅ Deploy complete!"

      - name: Health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          timeout: 5m
          command_timeout: 5m
          script: |
            sleep 10
            cd /opt/codex
            COMPOSE="docker compose -f docker-compose.prod.yml"

            for i in $(seq 1 15); do
              API_OK=$($COMPOSE exec -T api php artisan tinker --execute="echo 'OK';" 2>/dev/null | grep -c "OK" || true)
              WEB_OK=$(nc -z 127.0.0.1 80 2>/dev/null && echo 1 || echo 0)

              if [ "$API_OK" = "1" ] && [ "$WEB_OK" = "1" ]; then
                echo "✅ Health check passed!"
                exit 0
              fi
              echo "  Attempt $i/15..."
              sleep 3
            done
            echo "❌ Health check failed"
            exit 1

  # ─────────────────────────────────────────────────────────
  #  4. Auto-tag
  # ─────────────────────────────────────────────────────────
  tag:
    name: "🏷️ Tag"
    runs-on: ubuntu-latest
    needs: deploy
    if: success()
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Create tag
        run: |
          LATEST_TAG=$(git tag -l "v*" --sort=-v:refname | head -n 1)
          if [ -z "$LATEST_TAG" ]; then
            NEW_TAG="v1.0.0"
          else
            VERSION=${LATEST_TAG#v}
            MAJOR=$(echo $VERSION | cut -d. -f1)
            MINOR=$(echo $VERSION | cut -d. -f2)
            PATCH=$(echo $VERSION | cut -d. -f3)
            COMMITS=$(git log ${LATEST_TAG}..HEAD --pretty=%s)
            if echo "$COMMITS" | grep -qiE "^feat"; then
              MINOR=$((MINOR + 1)); PATCH=0
            else
              PATCH=$((PATCH + 1))
            fi
            NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          fi
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -a "$NEW_TAG" -m "Release $NEW_TAG"
          git push origin "$NEW_TAG"
          echo "✅ Tag $NEW_TAG created!"
