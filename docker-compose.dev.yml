# =============================================================
#  Docker Compose – DESARROLLO (Dev)
#  Levantar: docker compose -f docker-compose.dev.yml up --build
# =============================================================

services:

  # -----------------------------------------------------------
  #  Nginx – Punto de entrada (Reverse Proxy)
  # -----------------------------------------------------------
  webserver:
    image: nginx:1.25-alpine
    container_name: tfg_webserver_dev
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./api:/var/www/html:ro
    depends_on:
      - api
      - client
      - socket
    networks:
      - tfg_network

  # -----------------------------------------------------------
  #  Backend – Laravel 11 (PHP 8.3-FPM)
  # -----------------------------------------------------------
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: development
    container_name: tfg_api_dev
    restart: unless-stopped
    volumes:
      - ./api:/var/www/html
      - ./docker/php/php.dev.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - FRONTEND_URL=http://localhost:5173
      - AI_MODERATION_ENABLED=true
      - AI_MODERATION_URL=http://ai-moderation:8088
      - AI_MODERATION_TIMEOUT_SECONDS=4
    extra_hosts:
      - "mail.codex.daw.inspedralbes.cat:187.33.146.183"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-moderation:
        condition: service_started
    networks:
      - tfg_network

  # -----------------------------------------------------------
  #  AI Moderation – Node.js + Transformers
  # -----------------------------------------------------------
  ai-moderation:
    build:
      context: ./ai-moderation
      dockerfile: Dockerfile
    container_name: tfg_ai_moderation_dev
    restart: unless-stopped
    environment:
      - PORT=8088
      - AI_MODEL_ENABLED=true
      - AI_MODEL_ID=Xenova/toxic-bert
      - AI_ZERO_SHOT_ENABLED=${AI_ZERO_SHOT_ENABLED:-true}
      - AI_ZERO_SHOT_MODEL_ID=${AI_ZERO_SHOT_MODEL_ID:-MoritzLaurer/mDeBERTa-v3-base-mnli-xnli}
      - AI_ZERO_SHOT_BLOCK_THRESHOLD=${AI_ZERO_SHOT_BLOCK_THRESHOLD:-0.52}
      - AI_LLM_ENABLED=${AI_LLM_ENABLED:-false}
      - AI_LLM_BASE_URL=${AI_LLM_BASE_URL:-https://api.openai.com/v1}
      - AI_LLM_API_KEY=${AI_LLM_API_KEY:-}
      - AI_LLM_MODEL=${AI_LLM_MODEL:-gpt-4o-mini}
      - AI_BLOCK_THRESHOLD=0.72
      - AI_MEDIUM_THRESHOLD=0.45
      - AI_HIGH_THRESHOLD=0.65
      - AI_CRITICAL_THRESHOLD=0.85
      - AI_MAX_TEXT_LENGTH=6000
    networks:
      - tfg_network

  # -----------------------------------------------------------
  #  Frontend – React + Vite Dev Server
  # -----------------------------------------------------------
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: development
    container_name: tfg_client_dev
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
    command: [ "sh", "-c", "npm install && npm run dev -- --host" ]
    environment:
      - VITE_API_URL=http://localhost:8080/api
      - VITE_SOCKET_URL=http://localhost:8080
    networks:
      - tfg_network

  # -----------------------------------------------------------
  #  Socket – Node.js + Socket.io
  # -----------------------------------------------------------
  socket:
    build:
      context: ./socket
      dockerfile: Dockerfile
      target: development
    container_name: tfg_socket_dev
    restart: unless-stopped
    volumes:
      - ./socket:/app
      - socket_node_modules:/app/node_modules
    command: [ "sh", "-c", "npm install && npx nodemon index.js" ]
    environment:
      - NODE_ENV=development
      - PORT=3000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - API_URL=http://webserver:80
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - tfg_network

  # -----------------------------------------------------------
  #  MySQL 8.0
  # -----------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: tfg_mysql_dev
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_DATABASE:-tfg_database}
      MYSQL_USER: ${DB_USERNAME:-tfg_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-tfg_password}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpassword}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - tfg_network

  # -----------------------------------------------------------
  #  Redis – Caché, Sesiones, Colas, Pub/Sub para Socket.io
  # -----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: tfg_redis_dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tfg_network

  # -----------------------------------------------------------
  #  Mailpit – Servidor de correo para desarrollo
  # -----------------------------------------------------------
  mailpit:
    image: axllent/mailpit:latest
    container_name: tfg_mailpit_dev
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI
    networks:
      - tfg_network

  # -----------------------------------------------------------
  #  Adminer – Gestor de base de datos web
  # -----------------------------------------------------------
  adminer:
    image: adminer:latest
    container_name: tfg_adminer_dev
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql
    depends_on:
      - mysql
    networks:
      - tfg_network

# =============================================================
#  Volumes
# =============================================================
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  client_node_modules:
    driver: local
  socket_node_modules:
    driver: local

# =============================================================
#  Networks
# =============================================================
networks:
  tfg_network:
    driver: bridge
